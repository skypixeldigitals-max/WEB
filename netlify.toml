# Static site — HTML/CSS/JS with images. Tailwind CSS is pre-compiled and committed
# (css/style.css), so there is no build step. Serve the repo root as-is.
[build]
  publish = "."
  command = "echo 'No build needed — static site with pre-compiled CSS.'"

# Long-cache the images (they are content-hashed by path and rarely change).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
